name: Sync daily prices

on:
  schedule:
    # 05:00 and 17:00 in Vietnam time.
    - cron: "0 22 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync prices to Supabase
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICE_URL_FUEL: ${{ secrets.PRICE_URL_FUEL }}
          PRICE_URL_GOLD: ${{ secrets.PRICE_URL_GOLD }}
          FUEL_PRICE_REGION: ${{ secrets.FUEL_PRICE_REGION }}
        run: node scripts/sync-daily-prices.mjs
